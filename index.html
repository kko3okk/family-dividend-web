<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家的股息小徑</title>
<style>
  :root{
    --paper:#F6EEDD; --card:#FDF7EA; --card2:#F3E9D2; --line:#E3D4B8;
    --ink:#4A3E32; --mut:#8C7B66; --mut2:#B3A48C;
    --chang:#D96C4F; --chang-soft:#F6DCD1;
    --wife:#DFA53B; --wife-soft:#F8E9C8;
    --green:#7FA65A; --green-soft:#DCE8C8;
    --mono:ui-monospace,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    max-width:820px;margin:0 auto;padding:18px 16px 70px;-webkit-font-smoothing:antialiased}
  .eyebrow{font-size:11px;letter-spacing:.35em;color:var(--mut2)}
  h1{font-family:"Noto Serif TC",serif;font-size:24px;margin:4px 0 2px;letter-spacing:.08em}
  .meta{font-size:11px;color:var(--mut);margin-bottom:14px}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .gear{background:var(--card);border:1.5px solid var(--line);color:var(--mut);border-radius:12px;
    padding:8px 13px;font-size:12px;cursor:pointer;white-space:nowrap}

  /* 旅人切換 */
  .traveler{display:flex;background:var(--card);border:1.5px solid var(--line);border-radius:16px;
    overflow:hidden;margin-bottom:14px;box-shadow:0 3px 0 var(--line)}
  .traveler div{flex:1;text-align:center;padding:13px 4px;font-size:14px;font-weight:800;
    letter-spacing:.15em;color:var(--mut);cursor:pointer;transition:background .2s}
  .traveler div.on[data-p="chang"]{background:var(--chang);color:#FFF8EF}
  .traveler div.on[data-p="wife"]{background:var(--wife);color:#4A3E32}

  /* 山景里程碑 */
  .scene{background:var(--card);border:1.5px solid var(--line);border-radius:20px;
    overflow:hidden;margin-bottom:14px;box-shadow:0 4px 0 var(--line)}
  .scene svg{display:block;width:100%;height:auto}
  .scene .strip{display:flex;flex-wrap:wrap;border-top:1.5px dashed var(--line)}
  .strip .blk{flex:1;min-width:140px;padding:13px 15px;border-right:1.5px dashed var(--line)}
  .strip .blk:last-child{border-right:none}
  .strip .k{font-size:10.5px;color:var(--mut);letter-spacing:.12em;margin-bottom:3px}
  .strip .v{font-family:var(--mono);font-size:19px;font-weight:700;font-variant-numeric:tabular-nums}
  .strip .v.accent{color:var(--pcol,var(--chang))}

  /* 卡片 */
  .card{background:var(--card);border:1.5px solid var(--line);border-radius:18px;
    padding:18px 16px;margin-bottom:14px;box-shadow:0 3px 0 var(--line)}
  .card h3{font-family:"Noto Serif TC",serif;font-size:14px;letter-spacing:.2em;color:var(--mut);
    font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .card h3::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--pcol,var(--chang))}

  .adv{display:flex;align-items:center;gap:11px;background:var(--card2);
    border:1.5px solid var(--line);border-radius:14px;padding:11px 13px;margin-bottom:9px}
  .stb{font-size:10px;font-weight:800;letter-spacing:.08em;border-radius:20px;padding:4px 10px;white-space:nowrap}
  .b-act{background:var(--chang);color:#FFF8EF}
  .b-near{background:var(--wife);color:#4A3E32}
  .b-wait{background:#E7DCC6;color:var(--mut)}
  .b-open{background:var(--green);color:#FFF8EF}
  .adv .t{font-size:13.5px;font-weight:700}
  .adv .t .px{font-family:var(--mono);font-size:11px;color:var(--mut);font-weight:400;margin-left:6px}
  .adv .d{font-family:var(--mono);font-size:11px;color:var(--mut);margin-top:2px}
  .adv .d b{color:var(--chang);font-weight:700}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th{font-size:10px;color:var(--mut2);font-weight:600;text-align:left;padding:5px 3px;
    border-bottom:1.5px solid var(--line);letter-spacing:.08em}
  th.num,td.num{text-align:right;font-family:var(--mono)}
  td{padding:8px 3px;border-bottom:1.5px dashed var(--line);font-variant-numeric:tabular-nums}
  tr:last-child td{border-bottom:none}
  .tick{color:var(--mut2);font-size:10.5px}
  .otag{font-size:10px;border-radius:20px;padding:2px 8px;font-weight:700}
  .otag.chang{background:var(--chang-soft);color:var(--chang)}
  .otag.wife{background:var(--wife-soft);color:#A87A1E}

  .btn-row{display:flex;gap:10px;margin:4px 0 14px}
  .btn{flex:1;text-align:center;padding:14px;border-radius:16px;font-size:14px;font-weight:800;
    letter-spacing:.2em;cursor:pointer;border:none;background:var(--pcol,var(--chang));
    color:#FFF8EF;box-shadow:0 3px 0 rgba(74,62,50,.25)}

  dialog{margin:auto;position:fixed;inset:0;height:fit-content;max-height:88vh;overflow-y:auto;
    background:var(--card);color:var(--ink);border:2px solid var(--line);border-radius:20px;
    padding:20px 18px;max-width:420px;width:92%}
  dialog::backdrop{background:rgba(74,62,50,.45)}
  .dlg-x{position:absolute;top:12px;right:14px;width:32px;height:32px;border:1.5px solid var(--line);
    border-radius:10px;background:var(--card2);color:var(--mut);font-size:15px;line-height:29px;
    text-align:center;cursor:pointer}
  dialog h2{font-family:"Noto Serif TC",serif;font-size:16px;font-weight:800;letter-spacing:.1em;margin-bottom:2px}
  dialog .sub{font-size:11px;color:var(--mut);margin-bottom:14px}
  label{display:block;font-size:10px;color:var(--mut);letter-spacing:.1em;margin:12px 0 5px}
  .seg{display:flex;background:var(--card2);border:1.5px solid var(--line);border-radius:12px;overflow:hidden}
  .seg div{flex:1;text-align:center;padding:11px;font-size:14px;font-weight:800;letter-spacing:.15em;color:var(--mut);cursor:pointer}
  .seg .on.chang{background:var(--chang);color:#FFF8EF}
  .seg .on.wife{background:var(--wife);color:#4A3E32}
  .chips{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .chip{border:1.5px solid var(--line);background:var(--card2);border-radius:12px;padding:10px 4px;text-align:center;cursor:pointer}
  .chip .n{font-size:13px;font-weight:800}
  .chip .c{font-family:var(--mono);font-size:10px;color:var(--mut2);margin-top:2px}
  .chip.on{border-color:var(--wife);background:var(--wife-soft)}
  .chip.on .n{color:#A87A1E}
  dialog input{width:100%;background:#FFFDF6;border:1.5px solid var(--line);border-radius:10px;
    color:var(--ink);font-family:var(--mono);font-size:16px;padding:12px 10px;font-variant-numeric:tabular-nums}
  dialog input:focus{outline:2.5px solid var(--wife);outline-offset:1px;border-color:transparent}
  .row2{display:flex;gap:10px}.row2>div{flex:1}
  .preview{margin-top:14px;background:var(--green-soft);border:1.5px dashed var(--green);border-radius:12px;
    padding:11px 13px;font-size:12px;color:var(--ink);line-height:1.8;min-height:44px}
  .preview b{color:var(--chang);font-family:var(--mono)}
  dialog button.go{width:100%;margin-top:14px;padding:13px;border:none;border-radius:14px;
    background:var(--green);color:#FFF8EF;font-size:15px;font-weight:800;letter-spacing:.25em;cursor:pointer;
    box-shadow:0 3px 0 rgba(74,62,50,.25)}
  dialog button.go:disabled{opacity:.5;cursor:wait}
  .msg{font-size:12px;text-align:center;margin-top:8px;min-height:16px;color:var(--green)}
  .msg.err{color:var(--chang)}
  .note{font-size:10.5px;color:var(--mut);line-height:1.8}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="eyebrow">FAMILY DIVIDEND TRAIL</div>
    <h1>家的股息小徑 🌱</h1>
    <div class="meta" id="meta">載入中…</div>
  </div>
  <button class="gear" id="gearBtn">⚙ 設定</button>
</div>

<div class="traveler" id="traveler">
  <div data-p="chang" class="on">CHANG</div>
  <div data-p="wife">老婆</div>
</div>

<div class="scene">
  <div id="sceneSvg"></div>
  <div class="strip">
    <div class="blk"><div class="k">年股息</div><div class="v accent" id="pDiv">–</div></div>
    <div class="blk"><div class="k" id="nextK">距下一站</div><div class="v" id="nextV">–</div></div>
    <div class="blk"><div class="k">家庭合計</div><div class="v" id="famDiv">–</div></div>
    <div class="blk"><div class="k">報價</div><div class="v" style="font-size:12px;padding-top:5px" id="pxMeta">–</div></div>
  </div>
</div>

<div class="btn-row"><button class="btn" id="addBtn">＋ 記一筆買進</button></div>

<div class="card"><h3>買入指引</h3><div id="advBox"></div></div>

<div class="card"><h3>持股</h3>
  <table><thead><tr><th>標的</th><th class="num">股數</th><th class="num">年股息</th><th class="num">市值</th></tr></thead>
  <tbody id="holdBody"></tbody></table>
</div>

<div class="card"><h3>最近交易（全家）</h3>
  <table><thead><tr><th>日期</th><th>誰</th><th>標的</th><th class="num">股數</th><th class="num">價格</th></tr></thead>
  <tbody id="txBody"></tbody></table>
</div>

<div class="card note" id="ruleNote"></div>

<dialog id="txDlg">
  <div class="dlg-x" onclick="txDlg.close()">✕</div>
  <h2>＋ 記一筆買進</h2>
  <div class="sub">寫入後全家即時同步，小徑上的旅人會往前走</div>
  <label>誰買的</label>
  <div class="seg" id="ownerSeg">
    <div class="chang on" data-o="chang">CHANG</div>
    <div class="wife" data-o="wife">老婆</div>
  </div>
  <label>標的</label>
  <div class="chips" id="stockChips"></div>
  <div class="row2">
    <div><label>股數</label><input id="fShares" inputmode="numeric" type="number" min="1"></div>
    <div><label>成交價</label><input id="fPrice" inputmode="decimal" type="number" step="0.01"></div>
  </div>
  <div class="row2">
    <div><label>日期</label><input id="fDate" type="date"></div>
    <div><label>備註（選填）</label><input id="fMemo" placeholder="例：第二層觸發"></div>
  </div>
  <div class="preview" id="fPreview">填入股數後即顯示這筆會讓旅人前進多少</div>
  <button class="go" id="goBtn">寫入</button>
  <div class="msg" id="txMsg"></div>
</dialog>

<dialog id="setDlg">
  <div class="dlg-x" onclick="setDlg.close()">✕</div>
  <h2>裝置設定</h2>
  <div class="sub">貼上 GitHub Token（只需 data repo 的 Contents 讀寫）。僅存於此裝置。</div>
  <label>GitHub Token</label>
  <input type="password" id="tokenInput" placeholder="github_pat_…">
  <button class="go" id="tokenSave">儲存</button>
</dialog>

<script>
const OWNER="kko3okk", REPO="family-dividend-data", FILE="data.json";
const API=`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`;
const MILES=[{name:"旅遊站",amt:150000,icon:"🎈"},{name:"房貸站",amt:610000,icon:"🏡"},{name:"退休站",amt:1000000,icon:"🏯"}];
const ETA={chang:["第 3~4 年","第 9~10 年","第 12~14 年"],wife:["第 4~5 年","第 12~13 年","第 16~18 年"]};
const OWNER_STOCKS={chang:["4766","6803","0050"],wife:["0050","1231","4506","2832"]};
const PCOL={chang:"#D96C4F",wife:"#DFA53B"};
const TIERS=[[.055,1],[.06,2],[.065,3]];
const fmt=n=>Math.round(n).toLocaleString("zh-Hant");
let DATA=null,SHA=null,person="chang",fOwner="chang",fStock="4766";

const token=()=>localStorage.getItem("gh_token")||"";
const b64e=s=>btoa(String.fromCharCode(...new TextEncoder().encode(s)));
const b64d=s=>new TextDecoder().decode(Uint8Array.from(atob(s),c=>c.charCodeAt(0)));

async function load(){
  const h={"Accept":"application/vnd.github+json"};
  if(token())h.Authorization="Bearer "+token();
  const r=await fetch(API+"?t="+Date.now(),{headers:h});
  if(!r.ok)throw new Error("讀取失敗 HTTP "+r.status+"（請按 ⚙ 設定 Token）");
  const j=await r.json();SHA=j.sha;DATA=JSON.parse(b64d(j.content.replace(/\n/g,"")));
}
async function ensurePrices(){
  DATA.prices=DATA.prices||{};
  const ts=DATA.prices_updated?new Date(DATA.prices_updated):null;
  const fresh=ts&&(Date.now()-ts.getTime())<36*3600*1000;
  if(fresh){document.getElementById("pxMeta").textContent="回寫 "+DATA.prices_updated.slice(5,16).replace("T"," ");return;}
  try{
    const twse=await (await fetch("https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL")).json();
    let tpex=[];try{tpex=await (await fetch("https://www.tpex.org.tw/openapi/v1/tpex_mainboard_quotes")).json();}catch(e){}
    const want=Object.keys(DATA.stocks);
    twse.forEach(x=>{if(want.includes(x.Code)&&parseFloat(x.ClosingPrice))DATA.prices[x.Code]=parseFloat(x.ClosingPrice);});
    (tpex||[]).forEach(x=>{const c=x.SecuritiesCompanyCode||x.Code;
      const p=parseFloat(x.Close||x.ClosingPrice||x.LatestPrice);
      if(want.includes(c)&&p)DATA.prices[c]=p;});
    document.getElementById("pxMeta").textContent="收盤價（備援）";
  }catch(e){document.getElementById("pxMeta").textContent=ts?"舊報價":"無報價";}
}
function holdings(){const h={};DATA.transactions.forEach(t=>{const k=t.owner+"|"+t.stock;h[k]=(h[k]||0)+t.shares;});return h;}
function ownerDiv(h,o){let d=0;for(const[k,sh]of Object.entries(h)){const[ow,s]=k.split("|");if(ow===o)d+=sh*((DATA.stocks[s]||{}).div||0);}return d;}

/* ===== 宮崎駿山景 ===== */
function scene(divNow){
  const col=PCOL[person];
  // 小徑節點: 起點與三站
  const P=[[70,238],[280,205],[500,158],[706,96]];
  const amts=[0,...MILES.map(m=>m.amt)];
  // 旅人位置: 依年股息在區段內插
  let seg=0;while(seg<3&&divNow>=amts[seg+1])seg++;
  const a=amts[seg],b=amts[Math.min(seg+1,3)];
  const f=seg>=3?1:Math.min((divNow-a)/Math.max(b-a,1),1);
  const tx=P[seg][0]+(P[Math.min(seg+1,3)][0]-P[seg][0])*f;
  const ty=P[seg][1]+(P[Math.min(seg+1,3)][1]-P[seg][1])*f;
  const path=`M${P[0][0]},${P[0][1]} C 150,230 210,214 ${P[1][0]},${P[1][1]} S 420,175 ${P[2][0]},${P[2][1]} S 640,115 ${P[3][0]},${P[3][1]}`;
  const stations=MILES.map((m,i)=>{
    const[x,y]=P[i+1],hit=divNow>=m.amt;
    const pct=Math.min(divNow/m.amt*100,100);
    return `
    <g font-family="PingFang TC,Noto Sans TC,sans-serif">
      <circle cx="${x}" cy="${y}" r="8.5" fill="${hit?col:"#FDF7EA"}" stroke="${hit?col:"#B3A48C"}" stroke-width="2.5"/>
      <text x="${x}" y="${y-26}" text-anchor="middle" font-size="20">${m.icon}</text>
      <text x="${x}" y="${y+26}" text-anchor="middle" font-size="12.5" font-weight="800" fill="#4A3E32">${m.name}</text>
      <text x="${x}" y="${y+41}" text-anchor="middle" font-size="10" fill="#8C7B66" font-family="${'ui-monospace,Menlo,monospace'}">${m.amt/10000}萬 · ${pct.toFixed(1)}%</text>
      <text x="${x}" y="${y+55}" text-anchor="middle" font-size="9.5" fill="#B3A48C">${ETA[person][i]}</text>
    </g>`;
  }).join("");
  document.getElementById("sceneSvg").innerHTML=`
  <svg viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#CFE6EF"/><stop offset="1" stop-color="#F3EAD3"/>
      </linearGradient>
    </defs>
    <rect width="800" height="300" fill="url(#sky)"/>
    <circle cx="712" cy="52" r="26" fill="#F6C453" opacity=".9"/>
    <circle cx="712" cy="52" r="34" fill="#F6C453" opacity=".25"/>
    <g fill="#FFFFFF" opacity=".85">
      <ellipse cx="150" cy="60" rx="46" ry="15"/><ellipse cx="185" cy="52" rx="30" ry="12"/>
      <ellipse cx="430" cy="42" rx="52" ry="14"/><ellipse cx="470" cy="50" rx="30" ry="11"/>
    </g>
    <path d="M0,190 Q 200,120 420,168 T 800,120 V300 H0 Z" fill="#A9C489" opacity=".8"/>
    <path d="M0,225 Q 250,160 520,205 T 800,165 V300 H0 Z" fill="#8FB271"/>
    <path d="M0,262 Q 300,215 620,248 T 800,225 V300 H0 Z" fill="#6E9455"/>
    <path d="${path}" fill="none" stroke="#FFF6E3" stroke-width="7" stroke-linecap="round" opacity=".9"/>
    <path d="${path}" fill="none" stroke="#B99F78" stroke-width="2.5" stroke-dasharray="1 9" stroke-linecap="round"/>
    <g>
      <text x="${P[0][0]}" y="${P[0][1]-20}" text-anchor="middle" font-size="18">🏠</text>
      <circle cx="${P[0][0]}" cy="${P[0][1]}" r="7" fill="${col}"/>
      <text x="${P[0][0]}" y="${P[0][1]+24}" text-anchor="middle" font-size="11.5" font-weight="800" fill="#4A3E32">起點</text>
    </g>
    ${stations}
    <g>
      <circle cx="${tx}" cy="${ty-2}" r="10" fill="${col}" stroke="#FFF8EF" stroke-width="3"/>
      <circle cx="${tx}" cy="${ty-2}" r="16" fill="${col}" opacity=".18">
        <animate attributeName="r" values="12;19;12" dur="2.6s" repeatCount="indefinite"/>
      </circle>
      <text x="${tx}" y="${ty-18}" text-anchor="middle" font-size="15">${person==="chang"?"🚶":"🚶‍♀️"}</text>
    </g>
  </svg>`;
}

const badge=(c,t)=>`<span class="stb ${c}">${t}</span>`;
function advChang(){
  const P=DATA.prices||{},S=DATA.stocks,out=[];
  [["4766","南寶",""],["6803","崑鼎","除息後窗口 · "]].forEach(([sid,nm,pre])=>{
    const px=P[sid],div=S[sid].div;
    const t1=Math.round(div/.055),t2=Math.round(div/.06),t3=Math.round(div/.065);
    let b=badge("b-wait","等待"),d=pre+`<b>${t1}</b> 買1份 · ${t2} 買2份 · ${t3} 買3份`;
    if(px){
      if(px<=t3)b=badge("b-act","第三層 · 買3份");
      else if(px<=t2)b=badge("b-act","第二層 · 買2份");
      else if(px<=t1)b=badge("b-act","觸發 · 買1份");
      else if(px<=t1*1.02)b=badge("b-near","接近");
      if(px>t1)d+=`（差 ${(px-t1).toFixed(1)} 元）`;
    }
    out.push(`<div class="adv">${b}<div><div class="t">${nm}<span class="px">${px?"現價 "+px:"無報價"}</span></div><div class="d">${d}</div></div></div>`);
  });
  out.push(`<div class="adv">${badge("b-open","照扣")}<div><div class="t">0050</div><div class="d">每月 1.5 萬定期定額 · 不擇時</div></div></div>`);
  return out.join("");
}
function advWife(){
  const m=new Date().getMonth()+1,lhOpen=(m>=9||m<=1);
  return `
  <div class="adv">${badge("b-open","窗口開啟")}<div><div class="t">台產<span class="px">獎金 30%</span></div><div class="d">除息後三個月＝年度最便宜窗口（填息100%）</div></div></div>
  <div class="adv">${lhOpen?badge("b-open","窗口開啟"):badge("b-wait","等除權")}<div><div class="t">聯華食<span class="px">獎金 40%</span></div><div class="d">${lhOpen?"除權後窗口 · 分批買入":"8 月除權後再買 · 股價自動下修約一成"}</div></div></div>
  <div class="adv">${badge("b-open","隨時可買")}<div><div class="t">崇友<span class="px">獎金 30%</span></div><div class="d">除息已過 · 分 2~3 個月零股買入</div></div></div>
  <div class="adv">${badge("b-open","照扣")}<div><div class="t">0050</div><div class="d">每月 2 萬定期定額 · 不停扣</div></div></div>`;
}

function holdRows(h,o){
  const S=DATA.stocks,P=DATA.prices||{};
  return OWNER_STOCKS[o].map(sid=>{
    const sh=h[o+"|"+sid]||0,st=S[sid]||{name:sid,div:0},px=P[sid];
    return `<tr><td>${st.name} <span class="tick">${sid}</span></td>
      <td class="num">${sh?fmt(sh):"—"}</td><td class="num">${sh?fmt(sh*st.div):"—"}</td>
      <td class="num">${sh&&px?fmt(sh*px):"—"}</td></tr>`;
  }).join("");
}

function render(){
  document.body.style.setProperty("--pcol",PCOL[person]);
  const h=holdings(),pD=ownerDiv(h,person),oD=ownerDiv(h,person==="chang"?"wife":"chang");
  scene(pD);
  document.getElementById("pDiv").textContent=fmt(pD)+" 元";
  const next=MILES.find(m=>pD<m.amt);
  document.getElementById("nextK").textContent=next?("距"+next.name):"已到終點";
  document.getElementById("nextV").textContent=next?((next.amt-pD)/10000).toFixed(1)+" 萬":"🎉";
  document.getElementById("famDiv").textContent=fmt(pD+oD)+" 元";
  document.getElementById("advBox").innerHTML=person==="chang"?advChang():advWife();
  document.getElementById("holdBody").innerHTML=holdRows(h,person);
  document.getElementById("txBody").innerHTML=[...DATA.transactions]
    .sort((a,b)=>b.date.localeCompare(a.date)).slice(0,20).map(t=>`<tr>
      <td>${t.date.slice(5)}</td><td><span class="otag ${t.owner}">${t.owner==="chang"?"C":"W"}</span></td>
      <td>${(DATA.stocks[t.stock]||{}).name||t.stock}</td>
      <td class="num">${fmt(t.shares)}</td><td class="num">${t.price}</td></tr>`).join("");
  document.getElementById("ruleNote").innerHTML=person==="chang"
    ?"觸發價每年 3 月隨新股利重算（股利 ÷ 5.5%／6%／6.5%）。熔斷：南寶配息＜15、崑鼎配息停止成長、EPS 連兩年衰退 → 停買。"
    :"獎金購入 4:3:3、分 2~3 個月投入。年檢核：除權息季後確認三檔配息軌跡（崇友看維保營收占比）。";
  document.getElementById("meta").textContent=`資料 ${DATA.updated} · ${DATA.transactions.length} 筆紀錄`;
}

document.getElementById("traveler").querySelectorAll("div").forEach(d=>d.onclick=()=>{
  person=d.dataset.p;
  document.getElementById("traveler").querySelectorAll("div").forEach(x=>x.classList.toggle("on",x===d));
  localStorage.setItem("person",person);
  if(DATA)render();
});

function chips(){
  const box=document.getElementById("stockChips");
  const order=OWNER_STOCKS[fOwner].concat(Object.keys(DATA.stocks).filter(s=>!OWNER_STOCKS[fOwner].includes(s)));
  if(!order.includes(fStock))fStock=order[0];
  box.innerHTML=order.map(sid=>`<div class="chip ${sid===fStock?"on":""}" data-s="${sid}">
      <div class="n">${DATA.stocks[sid].name}</div><div class="c">${sid}</div></div>`).join("");
  box.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{fStock=c.dataset.s;chips();preview();});
}
function preview(){
  const sh=parseFloat(document.getElementById("fShares").value)||0;
  const el=document.getElementById("fPreview");
  if(!sh){el.innerHTML="填入股數後即顯示這筆會讓旅人前進多少";return;}
  const div=(DATA.stocks[fStock]||{}).div||0,h=holdings(),cur=ownerDiv(h,fOwner);
  const add=sh*div,next=MILES.find(m=>cur<m.amt)||MILES[MILES.length-1];
  el.innerHTML=`${fOwner==="chang"?"Chang":"老婆"} · ${DATA.stocks[fStock].name} · <b>+${fmt(sh)} 股</b><br>
    年股息 ${fmt(cur)} → <b>${fmt(cur+add)} 元</b>（+${fmt(add)}）<br>
    距${next.name} ${(cur/next.amt*100).toFixed(2)}% → <b>${((cur+add)/next.amt*100).toFixed(2)}%</b> 🌿`;
}
document.getElementById("ownerSeg").querySelectorAll("div").forEach(d=>d.onclick=()=>{
  fOwner=d.dataset.o;
  document.getElementById("ownerSeg").querySelectorAll("div").forEach(x=>x.classList.toggle("on",x===d));
  fStock=OWNER_STOCKS[fOwner][0];chips();preview();
});
document.getElementById("fShares").addEventListener("input",preview);
document.getElementById("addBtn").onclick=()=>{
  if(!DATA)return;
  fOwner=person;
  document.getElementById("ownerSeg").querySelectorAll("div").forEach(x=>x.classList.toggle("on",x.dataset.o===person));
  document.getElementById("fDate").valueAsDate=new Date();
  chips();preview();
  document.getElementById("txDlg").showModal();
};
document.getElementById("goBtn").onclick=async()=>{
  const msg=document.getElementById("txMsg"),btn=document.getElementById("goBtn");
  if(!token()){msg.className="msg err";msg.textContent="請先按 ⚙ 設定 Token";return;}
  const sh=parseFloat(document.getElementById("fShares").value),
        px=parseFloat(document.getElementById("fPrice").value),
        dt=document.getElementById("fDate").value;
  if(!sh||!px||!dt){msg.className="msg err";msg.textContent="股數／價格／日期必填";return;}
  btn.disabled=true;msg.className="msg";msg.textContent="寫入中…";
  try{
    await load();
    DATA.transactions.push({date:dt,owner:fOwner,stock:fStock,shares:sh,price:px,
      memo:document.getElementById("fMemo").value||""});
    DATA.updated=new Date().toISOString().slice(0,10);
    const r=await fetch(API,{method:"PUT",
      headers:{"Authorization":"Bearer "+token(),"Accept":"application/vnd.github+json"},
      body:JSON.stringify({message:`add tx ${dt}`,content:b64e(JSON.stringify(DATA,null,2)),sha:SHA})});
    if(!r.ok)throw new Error("HTTP "+r.status);
    msg.textContent="✓ 已寫入，旅人前進了 🌿";
    ["fShares","fPrice","fMemo"].forEach(id=>document.getElementById(id).value="");
    await load();render();
    setTimeout(()=>document.getElementById("txDlg").close(),900);
  }catch(e){msg.className="msg err";msg.textContent="寫入失敗："+e.message;}
  finally{btn.disabled=false;}
};
document.getElementById("gearBtn").onclick=()=>{
  document.getElementById("tokenInput").value=token();
  document.getElementById("setDlg").showModal();
};
document.getElementById("tokenSave").onclick=async()=>{
  localStorage.setItem("gh_token",document.getElementById("tokenInput").value.trim());
  document.getElementById("setDlg").close();
  try{await load();await ensurePrices();render();}catch(e){document.getElementById("meta").textContent=e.message;}
};
["txDlg","setDlg"].forEach(id=>{
  const dlg=document.getElementById(id);
  dlg.addEventListener("click",e=>{
    const r=dlg.getBoundingClientRect();
    if(e.clientX<r.left||e.clientX>r.right||e.clientY<r.top||e.clientY>r.bottom)dlg.close();
  });
});
(async function(){
  person=localStorage.getItem("person")||"chang";
  document.getElementById("traveler").querySelectorAll("div").forEach(x=>x.classList.toggle("on",x.dataset.p===person));
  try{await load();await ensurePrices();render();}
  catch(e){document.getElementById("meta").textContent=e.message;}
})();
</script>
</body>
</html>
