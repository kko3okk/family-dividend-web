<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<meta name="theme-color" content="#EEF1F6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="家的旅程">
<title>家的旅程</title>
<style>
  :root{
    --paper:#EEF1F6; --card:#F8FAFC; --card2:#E9EEF5; --line:#CFD9E6;
    --ink:#3A4356; --mut:#77839A; --mut2:#A3AEC2;
    --chang:#5B7FA6; --chang-soft:#DCE6F1;
    --wife:#A98BC0; --wife-soft:#EBE1F3;
    --green:#7FA894; --green-soft:#DCEAE3;
    --mono:ui-monospace,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    max-width:820px;margin:0 auto;padding:18px 16px 70px;-webkit-font-smoothing:antialiased}
  .eyebrow{font-size:11px;letter-spacing:.35em;color:var(--mut2)}
  h1{font-family:"Noto Serif TC",serif;font-size:24px;margin:4px 0 2px;letter-spacing:.08em}
  .meta{font-size:11px;color:var(--mut);margin-bottom:14px}
  .topbar{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .gear{background:var(--card);border:1.5px solid var(--line);color:var(--mut);border-radius:12px;
    padding:8px 13px;font-size:12px;cursor:pointer;white-space:nowrap}

  /* 旅人切換 */
  .traveler{display:flex;background:var(--card);border:1.5px solid var(--line);border-radius:16px;
    overflow:hidden;margin-bottom:14px;box-shadow:0 2px 10px rgba(58,67,86,.07)}
  .traveler div{flex:1;text-align:center;padding:13px 4px;font-size:14px;font-weight:800;
    letter-spacing:.15em;color:var(--mut);cursor:pointer;transition:background .2s}
  .traveler div.on[data-p="chang"]{background:var(--chang);color:#FFF8EF}
  .traveler div.on[data-p="wife"]{background:var(--wife);color:#4A3E32}

  /* 山景里程碑 */
  .scene{background:var(--card);border:1.5px solid var(--line);border-radius:20px;
    overflow:hidden;margin-bottom:14px;box-shadow:0 3px 14px rgba(58,67,86,.09)}
  .scene svg{display:block;width:100%;height:auto}
  .scene .strip{display:flex;flex-wrap:wrap;border-top:1.5px dashed var(--line)}
  .strip .blk{flex:1;min-width:140px;padding:13px 15px;border-right:1.5px dashed var(--line)}
  .strip .blk:last-child{border-right:none}
  .strip .k{font-size:10.5px;color:var(--mut);letter-spacing:.12em;margin-bottom:3px}
  .strip .v{font-family:var(--mono);font-size:19px;font-weight:700;font-variant-numeric:tabular-nums}
  .strip .v.accent{color:var(--pcol,var(--chang))}

  /* 卡片 */
  .card{background:var(--card);border:1.5px solid var(--line);border-radius:18px;
    padding:18px 16px;margin-bottom:14px;box-shadow:0 2px 10px rgba(58,67,86,.07)}
  .card h3{font-family:"Noto Serif TC",serif;font-size:14px;letter-spacing:.2em;color:var(--mut);
    font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .card h3::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--pcol,var(--chang))}

  .adv{display:flex;align-items:center;gap:11px;background:var(--card2);
    border:1.5px solid var(--line);border-radius:14px;padding:11px 13px;margin-bottom:9px}
  .stb{font-size:10px;font-weight:800;letter-spacing:.08em;border-radius:20px;padding:4px 10px;white-space:nowrap}
  .b-act{background:var(--chang);color:#FFF8EF}
  .b-near{background:var(--wife);color:#4A3E32}
  .b-wait{background:#E7DCC6;color:var(--mut)}
  .b-open{background:var(--green);color:#FFF8EF}
  .adv .t{font-size:13.5px;font-weight:700}
  .adv .t .px{font-family:var(--mono);font-size:11px;color:var(--mut);font-weight:400;margin-left:6px}
  .adv .d{font-family:var(--mono);font-size:11px;color:var(--mut);margin-top:2px}
  .adv .d b{color:var(--chang);font-weight:700}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th{font-size:10px;color:var(--mut2);font-weight:600;text-align:left;padding:5px 3px;
    border-bottom:1.5px solid var(--line);letter-spacing:.08em}
  th.num,td.num{text-align:right;font-family:var(--mono)}
  td{padding:8px 3px;border-bottom:1.5px dashed var(--line);font-variant-numeric:tabular-nums}
  tr:last-child td{border-bottom:none}
  .tick{color:var(--mut2);font-size:10.5px}
  .otag{font-size:10px;border-radius:20px;padding:2px 8px;font-weight:700}
  .otag.chang{background:var(--chang-soft);color:var(--chang)}
  .otag.wife{background:var(--wife-soft);color:#A87A1E}

  .btn-row{display:flex;gap:10px;margin:4px 0 14px}
  .btn{flex:1;text-align:center;padding:14px;border-radius:16px;font-size:14px;font-weight:800;
    letter-spacing:.2em;cursor:pointer;border:none;background:var(--pcol,var(--chang));
    color:#FFF8EF;box-shadow:0 2px 8px rgba(58,67,86,.18)}

  dialog{margin:auto;position:fixed;inset:0;height:fit-content;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
    background:var(--card);color:var(--ink);border:2px solid var(--line);border-radius:20px;
    padding:20px 18px;max-width:420px;width:92%}
  dialog::backdrop{background:rgba(74,62,50,.45)}
  .dlg-x{position:absolute;top:12px;right:14px;width:32px;height:32px;border:1.5px solid var(--line);
    border-radius:10px;background:var(--card2);color:var(--mut);font-size:15px;line-height:29px;
    text-align:center;cursor:pointer}
  dialog h2{font-family:"Noto Serif TC",serif;font-size:16px;font-weight:800;letter-spacing:.1em;margin-bottom:2px}
  dialog .sub{font-size:11px;color:var(--mut);margin-bottom:14px}
  label{display:block;font-size:10px;color:var(--mut);letter-spacing:.1em;margin:12px 0 5px}
  .seg{display:flex;background:var(--card2);border:1.5px solid var(--line);border-radius:12px;overflow:hidden}
  .seg div{flex:1;text-align:center;padding:11px;font-size:14px;font-weight:800;letter-spacing:.15em;color:var(--mut);cursor:pointer}
  .seg .on.chang{background:var(--chang);color:#FFF8EF}
  .seg .on.wife{background:var(--wife);color:#4A3E32}
  .chips{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .chip{border:1.5px solid var(--line);background:var(--card2);border-radius:12px;padding:10px 4px;text-align:center;cursor:pointer}
  .chip .n{font-size:13px;font-weight:800}
  .chip .c{font-family:var(--mono);font-size:10px;color:var(--mut2);margin-top:2px}
  .chip.on{border-color:var(--wife);background:var(--wife-soft)}
  .chip.on .n{color:#A87A1E}
  dialog input{width:100%;max-width:100%;min-width:0;background:#FFFDF6;border:1.5px solid var(--line);border-radius:10px;
    color:var(--ink);font-family:var(--mono);font-size:16px;padding:12px 10px;font-variant-numeric:tabular-nums}
  dialog input:focus{outline:2.5px solid var(--wife);outline-offset:1px;border-color:transparent}
  .row2{display:flex;gap:10px}.row2>div{flex:1;min-width:0}
  dialog input[type=date]{font-size:15px;text-align:left;-webkit-appearance:none;appearance:none;
    display:block;width:100%;max-width:100%;min-width:0}
  .preview{margin-top:14px;background:var(--green-soft);border:1.5px dashed var(--green);border-radius:12px;
    padding:11px 13px;font-size:12px;color:var(--ink);line-height:1.8;min-height:44px}
  .preview b{color:var(--chang);font-family:var(--mono)}
  dialog button.go{width:100%;margin-top:14px;margin-bottom:4px;padding:13px;border:none;border-radius:14px;
    background:var(--green);color:#FFF8EF;font-size:15px;font-weight:800;letter-spacing:.25em;cursor:pointer;
    box-shadow:0 2px 8px rgba(58,67,86,.18)}
  dialog button.go:disabled{opacity:.5;cursor:wait}
  .msg{font-size:12px;text-align:center;margin-top:8px;min-height:16px;color:var(--green)}
  .msg.err{color:var(--chang)}
  .note{font-size:10.5px;color:var(--mut);line-height:1.8}

  .cloudA{animation:drift 75s linear infinite}
  .cloudB{animation:drift 105s linear infinite}
  .cloudC{animation:drift 140s linear infinite}
  @keyframes drift{from{transform:translateX(-90px)}to{transform:translateX(890px)}}
  .birds{animation:fly 46s linear infinite}
  @keyframes fly{0%{transform:translate(-70px,112px);opacity:0}4%{opacity:.85}
    42%{opacity:.85}48%{transform:translate(860px,38px);opacity:0}100%{transform:translate(860px,38px);opacity:0}}
  .bob{animation:bob 1.5s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.5px)}}
  .sway{transform-box:fill-box;transform-origin:50% 100%;animation:sway 4.5s ease-in-out infinite}
  .sway.s2{animation-duration:5.6s;animation-delay:-2s}
  @keyframes sway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
  .petal{position:fixed;top:-24px;z-index:99;width:11px;height:9px;border-radius:60% 40% 55% 45%;
    pointer-events:none;animation:fall linear forwards}
  @keyframes fall{0%{transform:translateY(-20px) translateX(0) rotate(0)}
    100%{transform:translateY(105vh) translateX(60px) rotate(340deg);opacity:.15}}
  @media (prefers-reduced-motion:reduce){
    .cloudA,.cloudB,.birds,.bob,.sway,.petal{animation:none}}


  @media(max-width:480px){
    dialog{padding:16px 14px;max-height:90vh}
    dialog h2{font-size:15px}
    dialog .sub{margin-bottom:10px;font-size:10.5px}
    label{margin:9px 0 4px}
    .seg div{padding:9px 4px;font-size:13px}
    .chip{padding:8px 3px;border-radius:10px}
    .chip .n{font-size:12px}.chip .c{font-size:9px}
    .chips{gap:6px}
    dialog input{font-size:16px;padding:10px 9px}
    dialog input[type=date]{font-size:14px;max-width:100%}
    .preview{padding:9px 11px;font-size:11.5px;line-height:1.65;margin-top:10px}
    dialog button.go{padding:12px;margin-top:11px;font-size:14px}
    .dlg-x{top:9px;right:10px;width:30px;height:30px;line-height:27px}
  }

  #ptr{position:fixed;top:0;left:50%;transform:translate(-50%,-46px);z-index:120;
    width:38px;height:38px;border-radius:50%;background:var(--card);border:1.5px solid var(--line);
    box-shadow:0 3px 10px rgba(74,62,50,.18);display:flex;align-items:center;justify-content:center;
    font-size:17px;color:var(--mut);transition:transform .18s ease,opacity .18s;opacity:0}
  #ptr.spin{animation:ptrspin .9s linear infinite}
  @keyframes ptrspin{to{transform:rotate(360deg)}}

  .datewrap{width:100%;max-width:100%;overflow:hidden;border-radius:10px;display:block}
  .datewrap input[type=date]{width:100%!important;max-width:100%!important;min-width:0!important;
    box-sizing:border-box!important;-webkit-appearance:none!important;appearance:none!important}

  .wframe{animation:wstep .62s steps(1,end) infinite}
  .wframe.f2{animation-delay:.31s}
  @keyframes wstep{0%,49%{opacity:1}50%,100%{opacity:0}}
  @media (prefers-reduced-motion:reduce){.wframe{animation:none}.wframe.f2{opacity:0}}
</style>
</head>
<body>

<div id="ptr">↓</div>

<div class="topbar">
  <div>
    <div class="eyebrow">JOURNEY OF DIVIDENDS</div>
    <h1>家的旅程 ✦</h1>
    <div class="meta" id="meta">載入中…</div>
  </div>
  <button class="gear" id="gearBtn">⚙ 設定</button>
</div>

<div class="traveler" id="traveler">
  <div data-p="chang" class="on">CHANG</div>
  <div data-p="wife">老婆</div>
</div>

<div class="scene">
  <div id="sceneSvg"></div>
  <div class="strip">
    <div class="blk"><div class="k">年股息</div><div class="v accent" id="pDiv">–</div></div>
    <div class="blk"><div class="k" id="nextK">距下一站</div><div class="v" id="nextV">–</div></div>
    <div class="blk"><div class="k">家庭合計</div><div class="v" id="famDiv">–</div></div>
    <div class="blk"><div class="k">報價</div><div class="v" style="font-size:12px;padding-top:5px" id="pxMeta">–</div></div>
  </div>
</div>

<div class="btn-row"><button class="btn" id="addBtn">＋ 記一筆買進</button></div>

<div class="card"><h3>買入指引</h3><div id="advBox"></div></div>

<div class="card"><h3>持股</h3>
  <table><thead><tr><th>標的</th><th class="num">股數</th><th class="num">年股息</th><th class="num">市值</th></tr></thead>
  <tbody id="holdBody"></tbody></table>
</div>

<div class="card"><h3>最近交易（全家）</h3>
  <table><thead><tr><th>日期</th><th>誰</th><th>標的</th><th class="num">股數</th><th class="num">價格</th></tr></thead>
  <tbody id="txBody"></tbody></table>
</div>

<div class="card note" id="ruleNote"></div>
<div class="note" style="text-align:center;padding:0 4px 8px">
  旅人角色素材：Kenney（kenney.nl）· CC0 公眾領域授權 · 已改色
</div>

<dialog id="txDlg">
  <div class="dlg-x" onclick="txDlg.close()">✕</div>
  <h2>＋ 記一筆買進</h2>
  <div class="sub">寫入後全家即時同步，小徑上的旅人會往前走</div>
  <label>誰買的</label>
  <div class="seg" id="ownerSeg">
    <div class="chang on" data-o="chang">CHANG</div>
    <div class="wife" data-o="wife">老婆</div>
  </div>
  <label>標的</label>
  <div class="chips" id="stockChips"></div>
  <div class="row2">
    <div><label>股數</label><input id="fShares" inputmode="numeric" type="number" min="1"></div>
    <div><label>成交價</label><input id="fPrice" inputmode="decimal" type="number" step="0.01"></div>
  </div>
  <label>日期</label>
  <div class="datewrap"><input id="fDate" type="date"></div>
  <label>備註（選填）</label>
  <input id="fMemo" placeholder="例：第二層觸發">
  <div class="preview" id="fPreview">填入股數後即顯示這筆會讓旅人前進多少</div>
  <button class="go" id="goBtn">寫入</button>
  <div class="msg" id="txMsg"></div>
</dialog>

<dialog id="setDlg">
  <div class="dlg-x" onclick="setDlg.close()">✕</div>
  <h2>裝置設定</h2>
  <div class="sub">貼上 GitHub Token（只需 data repo 的 Contents 讀寫）。僅存於此裝置。</div>
  <label>GitHub Token</label>
  <input type="password" id="tokenInput" placeholder="github_pat_…">
  <button class="go" id="tokenSave">儲存</button>
</dialog>

<script>
const APP_VERSION="2026.07.23-0913";
const OWNER="kko3okk", REPO="family-dividend-data", FILE="data.json";
const API=`https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`;
const MILES=[{name:"旅遊站",amt:150000,icon:"🎈"},{name:"房貸站",amt:610000,icon:"🏡"},{name:"退休站",amt:1000000,icon:"🏯"}];
const ETA={chang:["第 3~4 年","第 9~10 年","第 12~14 年"],wife:["第 4~5 年","第 12~13 年","第 16~18 年"]};
const OWNER_STOCKS={chang:["4766","6803","0050"],wife:["0050","1231","4506","2832"]};
const PCOL={chang:"#D96C4F",wife:"#DFA53B"};
const TIERS=[[.055,1],[.06,2],[.065,3]];
const fmt=n=>Math.round(n).toLocaleString("zh-Hant");
let DATA=null,SHA=null,person="chang",fOwner="chang",fStock="4766";

const token=()=>localStorage.getItem("gh_token")||"";
const b64e=s=>btoa(String.fromCharCode(...new TextEncoder().encode(s)));
const b64d=s=>new TextDecoder().decode(Uint8Array.from(atob(s),c=>c.charCodeAt(0)));

async function load(){
  const h={"Accept":"application/vnd.github+json"};
  if(token())h.Authorization="Bearer "+token();
  const r=await fetch(API+"?t="+Date.now(),{headers:h});
  if(!r.ok)throw new Error("讀取失敗 HTTP "+r.status+"（請按 ⚙ 設定 Token）");
  const j=await r.json();SHA=j.sha;DATA=JSON.parse(b64d(j.content.replace(/\n/g,"")));
}
async function ensurePrices(){
  DATA.prices=DATA.prices||{};
  const ts=DATA.prices_updated?new Date(DATA.prices_updated):null;
  const fresh=ts&&(Date.now()-ts.getTime())<36*3600*1000;
  if(fresh){document.getElementById("pxMeta").textContent="回寫 "+DATA.prices_updated.slice(5,16).replace("T"," ");return;}
  try{
    const twse=await (await fetch("https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL")).json();
    let tpex=[];try{tpex=await (await fetch("https://www.tpex.org.tw/openapi/v1/tpex_mainboard_quotes")).json();}catch(e){}
    const want=Object.keys(DATA.stocks);
    twse.forEach(x=>{if(want.includes(x.Code)&&parseFloat(x.ClosingPrice))DATA.prices[x.Code]=parseFloat(x.ClosingPrice);});
    (tpex||[]).forEach(x=>{const c=x.SecuritiesCompanyCode||x.Code;
      const p=parseFloat(x.Close||x.ClosingPrice||x.LatestPrice);
      if(want.includes(c)&&p)DATA.prices[c]=p;});
    document.getElementById("pxMeta").textContent="收盤價（備援）";
  }catch(e){document.getElementById("pxMeta").textContent=ts?"舊報價":"無報價";}
}
function holdings(){const h={};DATA.transactions.forEach(t=>{const k=t.owner+"|"+t.stock;h[k]=(h[k]||0)+t.shares;});return h;}
function ownerDiv(h,o){let d=0;for(const[k,sh]of Object.entries(h)){const[ow,s]=k.split("|");if(ow===o)d+=sh*((DATA.stocks[s]||{}).div||0);}return d;}

/* ===== 山景 v2:會開花的小徑 ===== */
const FLOWER_COLS=["#9FD8C6","#A9C4E8","#C3B0DE","#E4E9F0","#8FD9C4"];
const TRAIL_D="M70,244 C 150,232 210,216 280,206 S 420,178 500,160 S 640,118 706,98";

function stationIdx(div){let i=0;MILES.forEach((m,k)=>{if(div>=m.amt)i=k+1});return i;}

function hut(x,y){return `
 <g transform="translate(${x},${y})">
  <rect x="-15" y="-16" width="30" height="16" rx="2" fill="#D9E2EC" stroke="#7B8CA6" stroke-width="1.5"/>
  <path d="M-19,-16 L0,-31 L19,-16 Z" fill="#6E7FA0" stroke="#55658A" stroke-width="1.5"/>
  <path d="M-19,-16 L0,-31 L19,-16 Z" fill="#EEF3F8" opacity=".35"/>
  <rect x="-4" y="-9" width="8" height="9" fill="#5A6B8C"/>
  <rect x="6" y="-28" width="5" height="9" fill="#7B8CA6"/>
  <circle cx="8.5" cy="-33" r="3" fill="#E5EDF5" opacity=".75"><animate attributeName="cy" values="-33;-45" dur="3.4s" repeatCount="indefinite"/><animate attributeName="opacity" values=".75;0" dur="3.4s" repeatCount="indefinite"/></circle>
  <circle cx="10" cy="-37" r="2.3" fill="#E5EDF5" opacity=".5"><animate attributeName="cy" values="-37;-49" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" values=".5;0" dur="4s" repeatCount="indefinite"/></circle>
  <text x="0" y="16" text-anchor="middle" font-size="11.5" font-weight="800" fill="#3A4356">起點</text>
 </g>`;}

/* 旅遊站:魔法路標燈 */
function balloon(x,y,hit){return `
 <g transform="translate(${x},${y})" ${hit?"":'filter="url(#mist)" opacity=".5"'}>
  <line x1="0" y1="0" x2="0" y2="-26" stroke="#7B8CA6" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M-9,-26 h18 l-3,-5 h-12 Z" fill="#8C9CB5"/>
  <g class="bob">
   <circle cx="0" cy="-36" r="7" fill="${hit?"#9FD8C6":"#C3CEDC"}" stroke="#7B8CA6" stroke-width="1.4"/>
   ${hit?'<circle cx="0" cy="-36" r="13" fill="#9FD8C6" opacity=".3"><animate attributeName="r" values="10;17;10" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values=".35;.05;.35" dur="3s" repeatCount="indefinite"/></circle>':""}
  </g>
  <path d="M-11,-14 h22" stroke="#7B8CA6" stroke-width="2" stroke-linecap="round"/>
 </g>`;}

/* 房貸站:石造小屋 */
function houseM(x,y,hit){return `
 <g transform="translate(${x},${y})" ${hit?"":'filter="url(#mist)" opacity=".5"'}>
  <rect x="-16" y="-17" width="32" height="17" rx="2" fill="#E3EAF2" stroke="#7B8CA6" stroke-width="1.5"/>
  <path d="M-20,-17 L0,-33 L20,-17 Z" fill="#6E7FA0" stroke="#55658A" stroke-width="1.5"/>
  <rect x="-11" y="-12" width="8" height="8" fill="${hit?"#F6E1A8":"#B9C6D6"}" stroke="#7B8CA6" stroke-width="1"/>
  <rect x="4" y="-12" width="8" height="12" fill="#5A6B8C"/>
  <rect x="9" y="-30" width="5" height="9" fill="#7B8CA6"/>

function layoutScene(prog,divNow,col){
  const svg=document.getElementById("hillSvg");
  const base=svg.querySelector("#trailBase");
  const L=base.getTotalLength();
  svg.querySelector("#trailWalk").setAttribute("stroke-dasharray",`${L*prog} ${L}`);
  const pt=f=>base.getPointAtLength(L*Math.min(Math.max(f,0),1));
  const P=[pt(0),pt(1/3),pt(2/3),pt(1)];
  const hit=i=>divNow>=MILES[i-1].amt;
  svg.querySelector("#marks").innerHTML=
    hut(P[0].x,P[0].y-4)
    +balloon(P[1].x,P[1].y-6,hit(1))+stLabel(P[1],MILES[0],0,divNow)
    +houseM(P[2].x,P[2].y-6,hit(2))+stLabel(P[2],MILES[1],1,divNow)
    +castle(P[3].x,P[3].y-8,hit(3))+stLabel(P[3],MILES[2],2,divNow);
  /* 走過的路開花:每 5,000 元一朵,前段先發芽 */
  const n=Math.min(Math.floor(divNow/5000),42);
  let fh="";
  for(let i=0;i<n;i++){
    const f=Math.min((i+0.7)/(n+1)*prog,prog-0.005);
    const p=pt(f),p2=pt(f+0.004);
    let nx=-(p2.y-p.y),ny=(p2.x-p.x);const nl=Math.hypot(nx,ny)||1;nx/=nl;ny/=nl;
    const side=((i%2)?1:-1)*(9+(i*7)%8);
    fh+=flowerSvg(p.x+nx*side,p.y+ny*side,FLOWER_COLS[i%FLOWER_COLS.length],i);
  }
  for(let i=0;i<6;i++){ /* 前方發芽的嫩苗:暗示路還會長 */
    const f=prog+0.015+(i*0.012);
    if(f>1)break;const p=pt(f);
    fh+=sprout(p.x+((i%2)?9:-9),p.y+3,i);
  }
  svg.querySelector("#flora").innerHTML=fh;
  /* 旅人 + 木牌 */
  const wp=pt(prog);
  const next=MILES.find(m=>divNow<m.amt);
  const gap=next?`還差 ${((next.amt-divNow)/10000).toFixed(1)} 萬到${next.name}`:"抵達終點 🎉";
  const W=26, H=30;   // 旅人顯示尺寸
  svg.querySelector("#walker").innerHTML=`
   <g transform="translate(${wp.x},${wp.y})">
     <ellipse cx="0" cy="5" rx="10" ry="2.8" fill="#3A4356" opacity=".16"/>
     <g class="bob">
       <image class="wframe" href="walker-${person}-0.png" x="${-W/2}" y="${-H+4}" width="${W}" height="${H}"/>
       <image class="wframe f2" href="walker-${person}-1.png" x="${-W/2}" y="${-H+4}" width="${W}" height="${H}"/>
       <circle cx="${W/2+1}" cy="${-H+10}" r="2.6" fill="#CDE9DE"/>
       <circle cx="${W/2+1}" cy="${-H+10}" r="6" fill="#9FD8C6" opacity=".3">
         <animate attributeName="r" values="4.5;8.5;4.5" dur="2.8s" repeatCount="indefinite"/></circle>
     </g>
   </g>
   <g transform="translate(${Math.min(Math.max(wp.x,64),736)},${wp.y-56})">
     <line x1="0" y1="14" x2="0" y2="28" stroke="#7B8CA6" stroke-width="3"/>
     <rect x="-62" y="-18" width="124" height="33" rx="9" fill="#42536F" stroke="#8FA3BC" stroke-width="1.6" opacity=".95"/>
     <text x="0" y="-3.5" text-anchor="middle" font-size="12" font-weight="800" fill="#EAF2F8" font-family="ui-monospace,Menlo,monospace">${fmt(divNow)} 元／年</text>
     <text x="0" y="9.5" text-anchor="middle" font-size="9.5" fill="#AFC8DC">${gap}</text>
   </g>`;
}

function celebrate(divNow){
  const key="mile_"+person,idx=stationIdx(divNow);
  const prev=parseInt(localStorage.getItem(key)||"0");
  localStorage.setItem(key,String(idx));
  if(idx>prev)petalRain();
}
function petalRain(){
  const cols=["#9FD8C6","#A9C4E8","#C3B0DE","#F4F0E2","#8FD9C4"];
  for(let i=0;i<26;i++){
    const d=document.createElement("div");
    d.className="petal";
    d.style.left=(Math.random()*100)+"vw";
    d.style.background=cols[i%cols.length];
    d.style.animationDuration=(3.2+Math.random()*2.4)+"s";
    d.style.animationDelay=(Math.random()*1.2)+"s";
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),7000);
  }
}

    let b=badge("b-wait","等待"),d=pre+`<b>${t1}</b> 買1份 · ${t2} 買2份 · ${t3} 買3份`;

  if(!sh){el.innerHTML="填入股數後即顯示這筆會讓旅人前進多少";return;}
  const div=(DATA.stocks[fStock]||{}).div||0,h=holdings(),cur=ownerDiv(h,fOwner);
  const add=sh*div,next=MILES.find(m=>cur<m.amt)||MILES[MILES.length-1];
  el.innerHTML=`${fOwner==="chang"?"Chang":"老婆"} · ${DATA.stocks[fStock].name} · <b>+${fmt(sh)} 股</b><br>
    年股息 ${fmt(cur)} → <b>${fmt(cur+add)} 元</b>（+${fmt(add)}）<br>
    距${next.name} ${(cur/next.amt*100).toFixed(2)}% → <b>${((cur+add)/next.amt*100).toFixed(2)}%</b> 🌿`;
}
document.getElementById("ownerSeg").querySelectorAll("div").forEach(d=>d.onclick=()=>{
  fOwner=d.dataset.o;
  document.getElementById("ownerSeg").querySelectorAll("div").forEach(x=>x.classList.toggle("on",x===d));
  fStock=OWNER_STOCKS[fOwner][0];chips();preview();
});
document.getElementById("fShares").addEventListener("input",preview);
document.getElementById("addBtn").onclick=()=>{
  if(!DATA)return;
  fOwner=person;
  document.getElementById("ownerSeg").querySelectorAll("div").forEach(x=>x.classList.toggle("on",x.dataset.o===person));
  document.getElementById("fDate").valueAsDate=new Date();
  chips();preview();
  document.getElementById("txDlg").showModal();
};
document.getElementById("goBtn").onclick=async()=>{
  const msg=document.getElementById("txMsg"),btn=document.getElementById("goBtn");
  if(!token()){msg.className="msg err";msg.textContent="請先按 ⚙ 設定 Token";return;}
  const sh=parseFloat(document.getElementById("fShares").value),
        px=parseFloat(document.getElementById("fPrice").value),
        dt=document.getElementById("fDate").value;
  if(!sh||!px||!dt){msg.className="msg err";msg.textContent="股數／價格／日期必填";return;}
  btn.disabled=true;msg.className="msg";msg.textContent="寫入中…";
  try{
    await load();
    DATA.transactions.push({date:dt,owner:fOwner,stock:fStock,shares:sh,price:px,
      memo:document.getElementById("fMemo").value||""});
    DATA.updated=new Date().toISOString().slice(0,10);
    const r=await fetch(API,{method:"PUT",
      headers:{"Authorization":"Bearer "+token(),"Accept":"application/vnd.github+json"},
      body:JSON.stringify({message:`add tx ${dt}`,content:b64e(JSON.stringify(DATA,null,2)),sha:SHA})});
    if(!r.ok)throw new Error("HTTP "+r.status);
    msg.textContent="✓ 已寫入，旅人前進了 🌿";
    ["fShares","fPrice","fMemo"].forEach(id=>document.getElementById(id).value="");
    await load();render();
    setTimeout(()=>document.getElementById("txDlg").close(),900);
  }catch(e){msg.className="msg err";msg.textContent="寫入失敗："+e.message;}
  finally{btn.disabled=false;}
};
document.getElementById("gearBtn").onclick=()=>{
  document.getElementById("tokenInput").value=token();
  document.getElementById("setDlg").showModal();
};
document.getElementById("tokenSave").onclick=async()=>{
  localStorage.setItem("gh_token",document.getElementById("tokenInput").value.trim());
  document.getElementById("setDlg").close();
  try{await load();await ensurePrices();render();}catch(e){document.getElementById("meta").textContent=e.message;}
};
["txDlg","setDlg"].forEach(id=>{
  const dlg=document.getElementById(id);
  dlg.addEventListener("click",e=>{
    const r=dlg.getBoundingClientRect();
    if(e.clientX<r.left||e.clientX>r.right||e.clientY<r.top||e.clientY>r.bottom)dlg.close();
  });
});



/* ── 自動更新：比對線上版本，發現新版即強制重載 ── */
async function checkUpdate(){
  try{
    const r=await fetch("version.json?t="+Date.now(),{cache:"no-store"});
    if(!r.ok)return;
    const v=(await r.json()).version;
    if(v&&v!==APP_VERSION){
      if(window.caches){const ks=await caches.keys();await Promise.all(ks.map(k=>caches.delete(k)));}
      location.replace(location.pathname+"?v="+encodeURIComponent(v));
    }
  }catch(e){}
}
checkUpdate();
document.addEventListener("visibilitychange",()=>{if(document.visibilityState==="visible")checkUpdate();});

/* ── 下拉重整（PWA 全螢幕模式沒有瀏覽器的下拉刷新）── */
async function refreshData(){
  const el=document.getElementById("ptr");
  el.style.opacity="1";el.style.transform="translate(-50%,14px)";
  el.textContent="⟳";el.classList.add("spin");
  try{await checkUpdate();await load();await ensurePrices();render();}catch(e){}
  el.classList.remove("spin");el.textContent="✓";
  setTimeout(()=>{el.style.opacity="0";el.style.transform="translate(-50%,-46px)";el.textContent="↓";},650);
}
(function(){
  let y0=null,pulling=false;const TH=72;const el=()=>document.getElementById("ptr");
  addEventListener("touchstart",e=>{
    if(window.scrollY<=0&&!document.querySelector("dialog[open]")){y0=e.touches[0].clientY;pulling=true;}
    else pulling=false;
  },{passive:true});
  addEventListener("touchmove",e=>{
    if(!pulling||y0===null)return;
    const d=e.touches[0].clientY-y0;
    if(d>0&&window.scrollY<=0){
      const p=Math.min(d,120),o=el();
      o.style.opacity=String(Math.min(p/TH,1));
      o.style.transform=`translate(-50%,${Math.min(p*.55,44)-46}px) rotate(${Math.min(p/TH,1)*180}deg)`;
    }
  },{passive:true});
  addEventListener("touchend",e=>{
    if(!pulling||y0===null)return;
    const d=(e.changedTouches[0].clientY-y0);y0=null;pulling=false;
    if(d>TH&&window.scrollY<=0)refreshData();
    else{const o=el();o.style.opacity="0";o.style.transform="translate(-50%,-46px)";}
  },{passive:true});
})();
/* 切回 App 時自動刷新（超過 2 分鐘沒更新才抓，省流量）*/
let lastLoad=Date.now();
document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState==="visible"&&Date.now()-lastLoad>120000){
    lastLoad=Date.now();refreshData();
  }
});
